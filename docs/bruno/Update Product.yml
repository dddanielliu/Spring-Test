info:
  name: Update Product
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseURL}}/product/{{id}}"
  body:
    type: json
    data: |-
      {
        "name": "Apple Airpods",
        "description": "version 2",
        "price": 199.99
      }
  auth: inherit

runtime:
  variables:
    - name: id
      value: "4"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseURL}}/product/{{id}}"
      method: PUT
      body:
        type: json
        data: |-
          {
            "name": "Apple Airpods",
            "description": "version 2",
            "price": 199.99
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: transfer-encoding
          value: chunked
        - name: date
          value: Thu, 25 Jun 2026 01:20:38 GMT
        - name: keep-alive
          value: timeout=60
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "description": "version 2",
            "id": 4,
            "name": "Apple Airpods"
          }
