info:
  name: Search By Name
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseURL}}/products/search?name=Samsung"
  params:
    - name: name
      value: Samsung
      type: query
  auth: inherit

runtime:
  variables:
    - name: id
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseURL}}/products/search?name=Samsung"
      method: GET
      params:
        - name: name
          value: Samsung
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: transfer-encoding
          value: chunked
        - name: date
          value: Thu, 25 Jun 2026 07:42:18 GMT
        - name: keep-alive
          value: timeout=60
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          [
            {
              "description": "Flagship phone with 128GB storage, Exynos 2100, and triple camera setup.",
              "id": 2,
              "name": "Samsung Galaxy S21"
            }
          ]
