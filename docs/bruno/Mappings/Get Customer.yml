info:
  name: Get Customer
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseURL}}/customer/{{id}}"
  auth: inherit

runtime:
  variables:
    - name: id
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseURL}}/customer/{{id}}"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: transfer-encoding
          value: chunked
        - name: date
          value: Thu, 25 Jun 2026 12:47:28 GMT
        - name: keep-alive
          value: timeout=60
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "addresses": [
              {
                "city": "Cityville",
                "customerId": 1,
                "id": 1,
                "state": "CA",
                "street": "123 Main St"
              },
              {
                "city": "CityC",
                "customerId": 1,
                "id": 2,
                "state": "SC",
                "street": "789 Pine St"
              }
            ],
            "firstName": "John",
            "id": 1,
            "lastName": "Doe"
          }
