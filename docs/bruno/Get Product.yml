info:
  name: Get Product
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseURL}}/product/{{id}}"
  auth: inherit

runtime:
  variables:
    - name: id
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseURL}}/product/{{id}}"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: transfer-encoding
          value: chunked
        - name: date
          value: Thu, 25 Jun 2026 01:07:49 GMT
        - name: keep-alive
          value: timeout=60
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "description": "Latest model with 256GB storage, A15 Bionic chip, and improved camera system.",
            "id": 1,
            "name": "Apple iPhone 14"
          }
  - name: example (not found)
    request:
      url: "{{baseURL}}/product/{{id}}"
      method: GET
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: content-type
          value: application/json
        - name: transfer-encoding
          value: chunked
        - name: date
          value: Thu, 25 Jun 2026 02:58:36 GMT
        - name: keep-alive
          value: timeout=60
        - name: connection
          value: keep-alive
      body:
        type: json
        data: |-
          {
            "message": "Product not found"
          }
